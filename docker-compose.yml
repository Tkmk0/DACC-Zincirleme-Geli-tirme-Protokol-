version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dacc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dacc
      POSTGRES_PASSWORD: dacc_secret
      POSTGRES_DB: dacc
    ports:
      - "5432:5432"
    volumes:
      - dacc_postgres_data:/var/lib/postgresql/data
      - ./scripts/db-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dacc -d dacc"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dacc_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - dacc_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dacc_postgres_data:
  dacc_redis_data:
